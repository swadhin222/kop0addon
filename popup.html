<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REC Plus Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #f0f4ff 0%, #e8eeff 100%);
      color: #1a1a2e;
      width: 400px;
      min-height: 520px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -100%;
      left: -50%;
      width: 200%;
      height: 300%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, transparent 50%);
      animation: shimmer 8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(10deg) translateY(-20px); }
    }

    .header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-wrapper {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.25);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-text .version {
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .version-badge {
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
    }

    /* Navigation Tabs - New Modern Design */
    .nav-wrapper {
      padding: 16px 18px;
      background: linear-gradient(180deg, #fff 0%, #f8faff 100%);
    }

    .nav-tabs {
      display: flex;
      background: #eef2ff;
      border-radius: 16px;
      padding: 5px;
      gap: 4px;
      box-shadow: inset 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .nav-tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #8892b0;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .nav-tab:hover:not(.active) {
      color: #667eea;
      background: rgba(102, 126, 234, 0.08);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transform: scale(1.02);
    }

    .nav-tab-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 10px;
      transition: all 0.35s ease;
    }

    .nav-tab.active .nav-tab-icon {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
    }

    .nav-tab-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* Main Content */
    .main {
      padding: 0 18px 18px 18px;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      animation: fadeSlide 0.35s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Section Cards */
    .section {
      background: #ffffff;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid rgba(102, 126, 234, 0.1);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .section:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f4ff;
    }

    .section-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .section-subtitle {
      font-size: 11px;
      color: #8892b0;
      font-weight: 500;
    }

    /* Input Group */
    .input-group {
      margin-bottom: 14px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #5a6180;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-label .label-icon {
      font-size: 12px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #f8faff;
      border: 2px solid #e8eeff;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      transition: all 0.25s ease;
      outline: none;
    }

    .input-field:hover {
      border-color: #c5d0ff;
    }

    .input-field:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .input-field::placeholder {
      color: #a0aec0;
      font-weight: 400;
    }

    /* Time Input Row */
    .time-input-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .time-unit {
      font-size: 13px;
      color: #667eea;
      font-weight: 600;
      background: #f0f4ff;
      padding: 8px 12px;
      border-radius: 8px;
    }

    /* Tags Container */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px;
      background: #f8faff;
      border: 2px solid #e8eeff;
      border-radius: 14px;
      min-height: 52px;
      cursor: text;
      transition: all 0.25s ease;
    }

    .tags-container:focus-within {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      animation: tagPop 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.35);
    }

    @keyframes tagPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .tag-remove {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      transition: all 0.2s ease;
    }

    .tag-remove:hover {
      background: rgba(255,255,255,0.5);
      transform: rotate(90deg);
    }

    /* Quick Add Buttons */
    .quick-add {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .quick-btn {
      padding: 10px 14px;
      background: #f8faff;
      border: 2px solid #e8eeff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      color: #5a6180;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .quick-btn:hover {
      border-color: #667eea;
      color: #667eea;
      background: #f0f4ff;
      transform: translateY(-1px);
    }

    .quick-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
    }

    /* Add Row */
    .add-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .add-row .input-field {
      flex: 1;
      padding: 12px 14px;
    }

    .add-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(102, 126, 234, 0.45);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    /* Save Button */
    .save-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
      background-size: 200% auto;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
    }

    .save-btn:hover {
      background-position: right center;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
    }

    .save-btn:active {
      transform: translateY(-1px);
    }

    .save-btn.saved {
      background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
      box-shadow: 0 6px 20px rgba(0, 200, 83, 0.35);
    }

    .save-icon {
      font-size: 18px;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      background: #fff;
      border-radius: 12px;
      margin-top: 16px;
      border: 1px solid #e8eeff;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e0;
      transition: all 0.3s ease;
    }

    .status-dot.active {
      background: #00c853;
      box-shadow: 0 0 12px rgba(0, 200, 83, 0.6);
      animation: pulse-status 2s ease-in-out infinite;
    }

    @keyframes pulse-status {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .status-text {
      font-size: 13px;
      color: #5a6180;
      font-weight: 500;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
      color: white;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 25px rgba(0, 200, 83, 0.4);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: linear-gradient(135deg, #f64f59 0%, #ff6b6b 100%);
      box-shadow: 0 8px 25px rgba(246, 79, 89, 0.4);
    }

    /* Empty State */
    .empty-state {
      color: #a0aec0;
      font-size: 13px;
      font-style: italic;
      font-weight: 400;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #c5d0ff;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #667eea;
    }

    /* Row Layout for Identity */
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-row .input-group {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="logo-wrapper">
        <img src="icons.png" alt="REC Plus" class="logo">
      </div>
      <div class="header-text">
        <h1>⚡ REC Plus Master</h1>
        <div class="version">
          <span class="version-badge">v1.4</span>
          <span>Settings Panel</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation Tabs - New Design -->
  <div class="nav-wrapper">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="timer">
        
        <span class="nav-tab-text">Timer</span>
      </button>
      <button class="nav-tab" data-tab="identity">
       
        <span class="nav-tab-text">Identity</span>
      </button>
      <button class="nav-tab" data-tab="telegram">
       
        <span class="nav-tab-text">Telegram</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    
    <!-- Timer Settings Tab -->
    <div class="tab-content active" id="tab-timer">
      <div class="section">
        <div class="section-header">
          <div class="section-icon">⏱️</div>
          <div>
            <div class="section-title">Timer Settings</div>
            <div class="section-subtitle">Configure alert timings</div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">
            <span class="label-icon">🔔</span> Final Alert Time
          </label>
          <div class="time-input-row">
            <input type="number" id="finalMinutes" class="input-field" placeholder="9" min="0" max="59" value="9">
            <span class="time-unit">min</span>
            <input type="number" id="finalSeconds" class="input-field" placeholder="40" min="0" max="59" value="40">
            <span class="time-unit">sec</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">
            <span class="label-icon">📊</span> Interval Alerts (minutes)
          </label>
          <div class="tags-container" id="tagsContainer">
            <span class="empty-state" id="emptyState">Click quick add or type below</span>
          </div>
          
          <div class="quick-add" id="quickAdd">
            <button class="quick-btn" data-value="3">3 min</button>
            <button class="quick-btn" data-value="4">4 min</button>
            <button class="quick-btn" data-value="5">5 min</button>
            <button class="quick-btn" data-value="6">6 min</button>
            <button class="quick-btn" data-value="7">7 min</button>
            <button class="quick-btn" data-value="8">8 min</button>
          </div>

          <div class="add-row">
            <input type="number" id="customInterval" class="input-field" placeholder="Custom (e.g., 2.5)" min="0.5" max="10" step="0.5">
            <button class="add-btn" id="addIntervalBtn">
              <span>➕</span> Add
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Identity Settings Tab -->
    <div class="tab-content" id="tab-identity">
      <div class="section">
        <div class="section-header">
          <div class="section-icon">🆔</div>
          <div>
            <div class="section-title">Identity Settings</div>
            <div class="section-subtitle">API key configuration</div>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">
            <span class="label-icon">👤</span> Name / Label
          </label>
          <input type="text" id="userName" class="input-field" placeholder="Enter display name">
        </div>
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">
              <span class="label-icon">🔧</span> API Key
            </label>
            <input type="text" id="apiKey" class="input-field" placeholder="sp1_status">
          </div>
          <div class="input-group">
            <label class="input-label">
              <span class="label-icon">📝</span> API Value
            </label>
            <input type="text" id="apiValue" class="input-field" placeholder="0">
          </div>
        </div>
      </div>
    </div>

    <!-- Telegram Settings Tab -->
    <div class="tab-content" id="tab-telegram">
      <div class="section">
        <div class="section-header">
          <div class="section-icon">📱</div>
          <div>
            <div class="section-title">Telegram Settings</div>
            <div class="section-subtitle">Configure bot notifications</div>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">
            <span class="label-icon">💬</span> Chat ID
          </label>
          <input type="text" id="chatId" class="input-field" placeholder="Enter your Chat ID">
        </div>
        <div class="input-group">
          <label class="input-label">
            <span class="label-icon">🔑</span> Bot Token
          </label>
          <input type="password" id="botToken" class="input-field" placeholder="Enter your Bot Token">
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <button class="save-btn" id="saveBtn">
      <span class="save-icon">💾</span>
      <span id="saveBtnText">Save Settings</span>
    </button>


  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Settings saved successfully!</div>

  <script src="popup.js"></script>
</body>
</html>
